<!DOCTYPE html>
<html>
<head>
    <title>i18n Test</title>
</head>
<body>
    <h1>i18n Test Page</h1>
    <div id="test-results"></div>
    
    <script>
        // Test if i18n resources are available
        console.log('Testing i18n...');
        
        // Try to access the main bundle and check for i18n
        fetch('/main.js')
            .then(response => response.text())
            .then(content => {
                const hasLabelingConfig = content.includes('labelingConfig');
                const hasLabelingInterface = content.includes('labelingInterface');
                const hasI18nInit = content.includes('i18n');
                
                const results = document.getElementById('test-results');
                results.innerHTML = `
                    <p>Has labelingConfig: ${hasLabelingConfig}</p>
                    <p>Has labelingInterface: ${hasLabelingInterface}</p>
                    <p>Has i18n: ${hasI18nInit}</p>
                `;
                
                console.log('i18n test results:', {
                    hasLabelingConfig,
                    hasLabelingInterface,
                    hasI18nInit
                });
            })
            .catch(error => {
                console.error('Error testing i18n:', error);
                document.getElementById('test-results').innerHTML = `<p>Error: ${error.message}</p>`;
            });
    </script>
</body>
</html>
